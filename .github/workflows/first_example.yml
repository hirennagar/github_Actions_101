name: My First workflow
on: (push)
jobs:
    First_job:
        runs-on: ubuntu-latest
        steps:
            name: Chekout code
            uses: actions/checkout@v6
            
            name: Welcome message
            run: echo "Hello,We are leaning Github Actions"

            name: List All the files
            run: ls

            name: Read the file
            runs: cat README.md
            name: Generate ASCII artwork
            run: cowsay -f dragon "Here the dragon comes" >> dragon.txt