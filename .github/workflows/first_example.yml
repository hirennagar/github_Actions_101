name: My First workflow
name: My First Workflow

on: [push]

jobs:
  First_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Welcome message
        run: echo "Hello, We are learning GitHub Actions"

      - name: List all files
        run: ls

      - name: Read the file
        run: cat README.md

      - name: Install cowsay
        run: sudo apt-get install cowsay -y

      - name: Generate ASCII artwork
        run: cowsay -f dragon "Here the dragon comes" > dragon.txt

      - name: Show dragon file
        run: cat dragon.txt