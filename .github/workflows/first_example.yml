name: My First workflow
name: First Workflow

on: push

jobs:
  First_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Welcome message
        run: echo "Hello, We are learning GitHub Actions"

      - name: List all files
        run: ls

      - name: Read README file
        run: cat README.md

      - name: Generate ASCII artwork
        run: |
          sudo apt-get update
          sudo apt-get install -y cowsay
          cowsay -f dragon "Here the dragon comes" >> dragon.txt
          cat dragon.txt